name: Deploy Django App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3
        with:
          token: ${{ gitea.token }}

      - name: Construir la imagen de Docker
        run: |
          docker build -t productivity_back:latest .

      - name: Desplegar en producción vía SSH
        uses: https://github.com/appleboy/ssh-action@v1.0.3
        with:
          host: 127.0.0.1
          username: devjdtpserver
          key: ${{ secrets.SSH_PRIVATE_KEY_1 }}
          port: 22
          script: |
            cd /home/devjdtpserver/Compartido/Productions/productivity-prod
            docker compose -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.prod.yml exec -T web python manage.py migrate --noinput
            docker compose -f docker-compose.prod.yml exec -T web python manage.py collectstatic --noinput
