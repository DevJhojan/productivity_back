version: '3.8'

services:
  web:
    image: productivity_back:latest  # <--- ESTO ESTABA MAL ALINEADO
    restart: always
    env_file: .env.prod
    ports:
      - "8000:8000"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    depends_on:
      - db

  db:
    image: postgres:15
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: .env.prod

volumes:
  postgres_data:
  static_volume:
  media_volume:
